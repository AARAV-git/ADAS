name: RoadSense AI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── FRONTEND CI ─────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend Verification (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Verify Production Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://dummy-backend.up.railway.app

  # ─── BACKEND CI ──────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend Verification (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libgl1 libsm6 libxext6 libxrender-dev ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check backend/ --quiet

      - name: Run Backend Smoke Tests
        run: |
          # Verify FastAPI can start and load all modules cleanly
          python -c "
          import sys
          sys.path.insert(0, './backend')
          from backend.main import app
          print('FastAPI app imported successfully!')
          "
