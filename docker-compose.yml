version: "3.9"

# ── RoadSense AI — Full Stack Docker Compose ──────────────────────────────────
# Usage:
#   1. cp .env.example .env  → fill in GROQ_API_KEY
#   2. docker compose up --build -d
#   Frontend → http://localhost:3000
#   Backend  → http://localhost:8000

services:

  # ── Backend: FastAPI + YOLOv8 ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: roadsense-backend:latest
    container_name: roadsense-backend

    # ── GPU access (remove 'deploy' block for CPU-only) ───────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    ports:
      - "${PORT:-8000}:8000"

    volumes:
      # Persistent video storage — put your .mp4 files here
      - ./data/videos:/data/videos
      # Persistent SQLite database
      - ./data/db:/data
      # Processed output videos
      - ./data/outputs:/data/outputs

    environment:
      - VIDEOS_DIR=/data/videos
      - OUTPUTS_DIR=/data/outputs
      - DATABASE_URL=sqlite+aiosqlite:////data/roadsense.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats/overview')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Frontend: Next.js ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Point the Next.js app at the backend container's public port
        NEXT_PUBLIC_API_URL: http://localhost:8000
    image: roadsense-frontend:latest
    container_name: roadsense-frontend

    ports:
      - "3000:3000"

    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped
